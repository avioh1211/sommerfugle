<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8"/>
  <title>Seed Firebase – Sommerfugle</title>
  <style>
    body { font-family: sans-serif; background: #f0f4ec; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: white; border-radius: 12px; padding: 40px; max-width: 480px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,.1); text-align: center; }
    h1 { color: #1e3a0f; font-size: 22px; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    button { background: #c4922a; color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
    button:hover { background: #d4a440; }
    button:disabled { background: #ccc; cursor: default; }
    .log { margin-top: 20px; text-align: left; font-size: 12px; color: #555; background: #f8f8f8; border-radius: 8px; padding: 14px; max-height: 220px; overflow-y: auto; }
    .ok { color: #3a6b1e; } .err { color: #c0392b; }
    .done { margin-top: 16px; background: #dff0d0; border-radius: 8px; padding: 14px; font-size: 13px; color: #1e3a0f; display: none; }
    a { color: #c4922a; }
  </style>
</head>
<body>
<div class="box">
  <h1>🦋 Indlæs sommerfugle-data</h1>
  <p>Klik på knappen for at uploade alle 10 sommerfugle-arter med billeder direkte til din Firebase-database.<br><br>Dette skal kun gøres <strong>én gang</strong>.</p>
  <button id="btn" onclick="runSeed()">Start upload til Firebase</button>
  <div class="log" id="log" style="display:none"></div>
  <div class="done" id="done">
    ✅ Alle arter er uploadet! Du kan nu lukke denne side og åbne <a href="index.html">index.html</a>.
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBw9a6WAdh6tkvOj1sMSQpFbNx9Hj1Pdfs",
    authDomain: "sommerfugle-gladsaxe.firebaseapp.com",
    projectId: "sommerfugle-gladsaxe",
    storageBucket: "sommerfugle-gladsaxe.firebasestorage.app",
    messagingSenderId: "465649267734",
    appId: "1:465649267734:web:2f6349fd468a57ca787137"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const col = collection(db, "sommerfugle");

  window.runSeed = async function() {
    const btn = document.getElementById("btn");
    const log = document.getElementById("log");
    log.style.display = "block";
    btn.disabled = true;
    btn.textContent = "Uploader…";

    function logMsg(msg, cls) {
      const line = document.createElement("div");
      line.className = cls || "";
      line.textContent = msg;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    // Clear existing docs first
    logMsg("🗑 Sletter eksisterende data…");
    try {
      const existing = await getDocs(col);
      for (const d of existing.docs) await deleteDoc(doc(db, "sommerfugle", d.id));
      logMsg("✓ Eksisterende data slettet", "ok");
    } catch(e) {
      logMsg("⚠ Ingen eksisterende data at slette");
    }

    // Upload each butterfly
    for (const item of SEED_DATA) {
      try {
        await addDoc(col, item);
        logMsg("✓ " + item.name, "ok");
      } catch(e) {
        logMsg("✗ Fejl ved " + item.name + ": " + e.message, "err");
      }
    }

    btn.textContent = "Upload fuldført ✓";
    document.getElementById("done").style.display = "block";
    logMsg("🎉 Færdig!", "ok");
  };
</script>
